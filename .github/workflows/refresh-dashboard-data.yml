name: Refresh dashboard data

on:
  workflow_dispatch:
    inputs:
      start_date:
        description: "Cohort start date (YYYY-MM-DD)"
        required: true
        default: "2026-01-01"
      end_date:
        description: "Optional cohort end date (YYYY-MM-DD, inclusive)"
        required: false
        default: ""
      mtd:
        description: "Use month-to-date bounds (true/false)"
        required: true
        default: "true"
      as_of_date:
        description: "Optional as-of date for MTD (YYYY-MM-DD)"
        required: false
        default: ""
      eligible_only:
        description: "Filter to flag_eligible_lead = TRUE (true/false)"
        required: true
        default: "false"
  schedule:
    # 13:15 UTC daily
    - cron: "15 13 * * *"

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY_JSON }}

      - name: Setup gcloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Install dependencies
        run: python -m pip install --upgrade pip

      - name: Refresh dashboard CSV from BigQuery
        run: |
          python scripts/refresh_dashboard_data.py \
            --start-date "${{ github.event.inputs.start_date || '2026-01-01' }}" \
            ${{ github.event.inputs.end_date && format('--end-date {0}', github.event.inputs.end_date) || '' }} \
            ${{ github.event.inputs.mtd == 'true' && '--mtd' || '' }} \
            ${{ github.event.inputs.as_of_date && format('--as-of-date {0}', github.event.inputs.as_of_date) || '' }} \
            ${{ github.event.inputs.eligible_only == 'true' && '--eligible-only' || '' }}

      - name: Commit and push if data changed
        run: |
          if git diff --quiet docs/data/latest.csv docs/data/latest.metadata.json; then
            echo "No data changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/latest.csv docs/data/latest.metadata.json
          git commit -m "Refresh dashboard data from BigQuery"
          git push origin HEAD:main
