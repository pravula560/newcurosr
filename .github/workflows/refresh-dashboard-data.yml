name: Refresh dashboard data

on:
  workflow_dispatch:
  schedule:
    # 13:15 UTC daily
    - cron: "15 13 * * *"

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Install BigQuery client
        run: python -m pip install --upgrade pip google-cloud-bigquery

      - name: Refresh dashboard CSV from BigQuery
        run: |
          python scripts/refresh_dashboard_data.py \
            --project-id "${{ secrets.GCP_PROJECT_ID }}" \
            --start-date "${{ vars.APL_START_DATE }}" \
            --days-back "${{ vars.APL_DAYS_BACK }}"

      - name: Commit and push if data changed
        run: |
          if git diff --quiet docs/data/latest.csv; then
            echo "No data changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/latest.csv
          git commit -m "Refresh dashboard data from BigQuery"
          git push origin HEAD:main
