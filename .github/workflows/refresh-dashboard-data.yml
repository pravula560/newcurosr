name: Refresh dashboard data

on:
  workflow_dispatch:
    inputs:
      start_date:
        description: "Cohort start date (YYYY-MM-DD)"
        required: true
        default: "2026-01-01"
      end_date:
        description: "Optional cohort end date (YYYY-MM-DD, inclusive)"
        required: false
        default: ""
      mtd:
        description: "Use month-to-date bounds (true/false)"
        required: true
        default: "true"
      as_of_date:
        description: "Optional as-of date for MTD (YYYY-MM-DD)"
        required: false
        default: ""
      eligible_only:
        description: "Filter to flag_eligible_lead = TRUE (true/false)"
        required: true
        default: "false"
  schedule:
    # 13:15 UTC daily
    - cron: "15 13 * * *"

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY_JSON }}

      - name: Setup gcloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Install dependencies
        run: python -m pip install --upgrade pip

      - name: Refresh dashboard CSV from BigQuery
        shell: bash
        env:
          START_DATE: ${{ github.event.inputs.start_date }}
          END_DATE: ${{ github.event.inputs.end_date }}
          MTD: ${{ github.event.inputs.mtd }}
          AS_OF_DATE: ${{ github.event.inputs.as_of_date }}
          ELIGIBLE_ONLY: ${{ github.event.inputs.eligible_only }}
        run: |
          set -euo pipefail
          START_DATE="${START_DATE:-2026-01-01}"
          MTD="${MTD:-true}"
          ELIGIBLE_ONLY="${ELIGIBLE_ONLY:-false}"

          args=("--start-date" "$START_DATE")
          if [[ -n "${END_DATE:-}" ]]; then
            args+=("--end-date" "$END_DATE")
          fi
          if [[ "$MTD" == "true" ]]; then
            args+=("--mtd")
          fi
          if [[ -n "${AS_OF_DATE:-}" ]]; then
            args+=("--as-of-date" "$AS_OF_DATE")
          fi
          if [[ "$ELIGIBLE_ONLY" == "true" ]]; then
            args+=("--eligible-only")
          fi

          python scripts/refresh_dashboard_data.py "${args[@]}"

      - name: Commit and push if data changed
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet docs/data/latest.csv; then
            echo "No data changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/latest.csv
          git commit -m "Refresh dashboard data from BigQuery"
          for delay in 4 8 16 32; do
            if git push origin HEAD:main; then
              exit 0
            fi
            echo "Push failed, retrying in ${delay}s..."
            sleep "$delay"
          done
          echo "Push failed after retries."
          exit 1
